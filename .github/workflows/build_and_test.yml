---
name: sst-hgcc build/test

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}-${{ github.event.pull_request.number || github.run_number }}
  cancel-in-progress: true

permissions: {}

jobs:
  macos-14:
    runs-on: macos-14
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/install
      LLVM_ROOT: /opt/homebrew/opt/llvm@22
      FILECHECK: /opt/homebrew/opt/llvm@22/bin/FileCheck
      TERM: dumb
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPILERCHECK: content
    steps:
      - name: Clone core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-core
          persist-credentials: false
          ref: devel
          repository: sstsimulator/sst-core

      - name: Clone elements
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-elements
          persist-credentials: false
          ref: devel
          repository: sstsimulator/sst-elements

      - name: Clone hgcc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-hgcc
          persist-credentials: false

      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            ccache \
            libtool \
            lit \
            llvm@22 \
            open-mpi

      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-llvm22-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-llvm22-

      - name: Set environment
        run: |
          echo "${LLVM_ROOT}/bin" >> "${GITHUB_PATH}"
          echo "PATH=${LLVM_ROOT}/bin:${PATH}" >> "${GITHUB_ENV}"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "${GITHUB_ENV}"
          echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu)" >> "${GITHUB_ENV}"
          echo "CC=ccache clang" >> "${GITHUB_ENV}"
          echo "CXX=ccache clang++" >> "${GITHUB_ENV}"
          ccache --zero-stats

      - name: Build and install core
        run: |
          pushd sst-core
          ./autogen.sh
          popd
          mkdir -p sst-core-build
          pushd sst-core-build
          ../sst-core/configure --prefix="${INSTALL_PREFIX}"
          make install
          popd

      - name: Build and install elements
        run: |
          pushd sst-elements
          ./autogen.sh
          popd
          mkdir -p sst-elements-build
          pushd sst-elements-build
          ../sst-elements/configure \
            --prefix="${INSTALL_PREFIX}" \
            --with-sst-core="${INSTALL_PREFIX}"
          make install
          popd

      - name: Build hgcc
        run: |
          export PATH="${INSTALL_PREFIX}/bin:${LLVM_ROOT}/bin:${PATH}"
          pushd sst-hgcc
          ./autogen.sh
          popd
          mkdir -p sst-hgcc-build
          pushd sst-hgcc-build
          ../sst-hgcc/configure \
            --prefix="${INSTALL_PREFIX}" \
            --with-sst-core="${INSTALL_PREFIX}" \
            --with-sst-elements="${INSTALL_PREFIX}" \
            --with-clang="${LLVM_ROOT}" \
            --with-std=17 \
            --enable-strict-tests \
            CC=clang \
            CXX=clang++
          make CC="ccache clang" CXX="ccache clang++"
          popd
          ccache --show-stats

      - name: Test hgcc
        run: |
          export PATH="${INSTALL_PREFIX}/bin:${LLVM_ROOT}/bin:${PATH}"
          pushd sst-hgcc-build
          make check
          popd

      - name: Upload hgcc test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: hgcc-test-output-macos-14
          path: |
            sst-hgcc-build/tests/lit-junit.xml
            sst-hgcc/tests/lit-tests/Output
            sst-hgcc-build/tests/out.log
          if-no-files-found: ignore
          compression-level: 9
          retention-days: 5

  ubuntu-24_04:
    runs-on: ubuntu-24.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/install
      LLVM_ROOT: /usr/lib/llvm-22
      FILECHECK: /usr/lib/llvm-22/bin/FileCheck
      TERM: dumb
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPILERCHECK: content
    steps:
      - name: Clone core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-core
          persist-credentials: false
          ref: devel
          repository: sstsimulator/sst-core

      - name: Clone elements
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-elements
          persist-credentials: false
          ref: devel
          repository: sstsimulator/sst-elements

      - name: Clone hgcc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          path: sst-hgcc
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            ccache \
            libopenmpi-dev \
            libtool-bin \
            python3-dev \
            python3-pip \
            wget
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y \
            clang-22 \
            libclang-22-dev \
            libclang-cpp22-dev \
            llvm-22-dev
          python3 -m pip install lit

      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-llvm22-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-llvm22-

      - name: Set environment
        run: |
          echo "${LLVM_ROOT}/bin" >> "${GITHUB_PATH}"
          echo "PATH=${LLVM_ROOT}/bin:${PATH}" >> "${GITHUB_ENV}"
          echo "MAKEFLAGS=-j$(nproc)" >> "${GITHUB_ENV}"
          echo "CC=ccache gcc" >> "${GITHUB_ENV}"
          echo "CXX=ccache g++" >> "${GITHUB_ENV}"
          ccache --zero-stats

      - name: Build and install core
        run: |
          pushd sst-core
          ./autogen.sh
          popd
          mkdir -p sst-core-build
          pushd sst-core-build
          ../sst-core/configure --prefix="${INSTALL_PREFIX}"
          make install
          popd

      - name: Build and install elements
        run: |
          pushd sst-elements
          ./autogen.sh
          popd
          mkdir -p sst-elements-build
          pushd sst-elements-build
          ../sst-elements/configure \
            --prefix="${INSTALL_PREFIX}" \
            --with-sst-core="${INSTALL_PREFIX}"
          make install
          popd

      - name: Build hgcc
        run: |
          export PATH="${INSTALL_PREFIX}/bin:${LLVM_ROOT}/bin:${PATH}"
          pushd sst-hgcc
          ./autogen.sh
          popd
          mkdir -p sst-hgcc-build
          pushd sst-hgcc-build
          ../sst-hgcc/configure \
            --prefix="${INSTALL_PREFIX}" \
            --with-sst-core="${INSTALL_PREFIX}" \
            --with-sst-elements="${INSTALL_PREFIX}" \
            --with-clang="${LLVM_ROOT}" \
            --with-std=17 \
            --enable-strict-tests \
            CC=gcc \
            CXX=g++
          make CC="ccache gcc" CXX="ccache g++"
          popd
          ccache --show-stats

      - name: Test hgcc
        run: |
          export PATH="${INSTALL_PREFIX}/bin:${LLVM_ROOT}/bin:${PATH}"
          pushd sst-hgcc-build
          make check
          popd

      - name: Upload hgcc test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: hgcc-test-output-ubuntu-24.04
          path: |
            sst-hgcc-build/tests/lit-junit.xml
            sst-hgcc/tests/lit-tests/Output
            sst-hgcc-build/tests/out.log
          if-no-files-found: ignore
          compression-level: 9
          retention-days: 5
